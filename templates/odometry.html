<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Python video streaming</title>
</head>

<body>
    <div>
        <h3>Performance Data</h3>
        <div>Time budget: <span id="val-time-budget">0</span> ms</div>
        <div>Pre-processing time: <span id="val-prep-time">0</span> ms</div>
        <div>Prepare frame time: <span id="val-cache-time">0</span> ms</div>
        <div>Compute odometry time: <span id="val-compute-time">0</span> ms</div>

        <h3>Translation</h3>
        <div>X (forwards/backwards): <span id="val-x">0</span></div>
        <div>Y (right/left): <span id="val-y">0</span></div>
        <div>Z (down/up): <span id="val-z">0</span></div>

        <h3>Rotation</h3>
        <div>Roll: <span id="val-roll">0</span></div>
        <div>Pitch: <span id="val-pitch">0</span></div>
        <div>Yaw: <span id="val-yaw">0</span></div>
    </div>
</body>


<script>
    // Ensure 'source' is defined (e.g., your EventSource URL)
    const source = new EventSource("{{ url_for('odometry_stream') }}");

    source.onmessage = function (event) {
        const data = JSON.parse(event.data);

        // Performance Data (usually whole numbers, but can be formatted)
        document.getElementById("val-time-budget").innerText = data.time_budget.toFixed(0);
        document.getElementById("val-prep-time").innerText = data.prep_time.toFixed(0);
        document.getElementById("val-cache-time").innerText = data.cache_time.toFixed(0);
        document.getElementById("val-compute-time").innerText = data.compute_time.toFixed(0);

        // Translation
        document.getElementById("val-x").innerText = data.x.toFixed(2);
        document.getElementById("val-y").innerText = data.y.toFixed(2);
        document.getElementById("val-z").innerText = data.z.toFixed(2);

        // Rotation
        document.getElementById("val-roll").innerText = data.roll.toFixed(1);
        document.getElementById("val-pitch").innerText = data.pitch.toFixed(1);
        document.getElementById("val-yaw").innerText = data.yaw.toFixed(1);
    };
</script>

</html>
