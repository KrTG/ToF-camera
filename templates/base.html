<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}Kamera ToF{% endblock %}</title>
</head>

<body>
    <h1>Kamera ToF - Menu Główne</h1>

    <nav class="menu-container">
        <div><a href="{{ url_for('index') }}" class="btn">Menu główne</a></div>
        <div><a href="{{ url_for('video') }}" class="btn">Podgląd obrazu z kamery</a></div>
        <div><a href="{{ url_for('odometry') }}" class="btn">Odometria</a></div>
        <div><a href="{{ url_for('recording') }}" class="btn">Nagrywanie</a></div>
        <div><a href="{{ url_for('list_playbacks') }}" class="btn">Odtwarzanie</a></div>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>


<style>
    /* ── Design Tokens ── */
    :root {
        --bg: #090c14;
        --surface: rgba(23, 27, 41, 0.7);
        --border: rgba(255, 255, 255, 0.08);
        --text: #f1f5f9;
        --primary: #6366f1;
        --primary-hover: #8b5cf6;
        --accent: #fb7185;
        --primary-glow: rgba(139, 92, 246, 0.25);
        --radius: 16px;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        color: var(--text);
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    /* ── Navigation Menu ── */
    .menu-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 16px;
        position: sticky;
        top: 0;
        z-index: 90;
        background: linear-gradient(to bottom, var(--bg) 70%, transparent);
        padding-bottom: 22px;
    }

    .btn {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: 100%;
        padding: 16px 12px;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        text-decoration: none;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
    }

    .btn:hover {
        background: rgba(99, 102, 241, 0.15);
        border-color: var(--primary-hover);
        box-shadow: 0 0 15px var(--primary-glow);
        transform: translateY(-2px);
    }

    .btn:active {
        transform: scale(0.96);
    }

    /* ── Content Area ── */
    .content {
        padding: 8px 16px 32px;
    }

    /* ── Big Action Buttons ── */
    .big_button {
        display: block;
        width: 100%;
        padding: 18px 24px;
        margin: 12px 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 50%, var(--accent) 100%);
        background-size: 200% auto;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .big_button:hover {
        background-position: right center;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
    }

    .big_button:active {
        transform: scale(0.96);
    }

    /* ── General Interactive ── */
    button, [type="submit"] {
        cursor: pointer;
        font-family: inherit;
    }

    /* ── Form spacing ── */
    form {
        margin-bottom: 8px;
    }

    /* ── Responsive ── */
    @media (min-width: 600px) {
        .menu-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .content {
            max-width: 700px;
            margin: 0 auto;
        }
    }
</style>

</html>
